name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.3"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: drupal11-app
  ECS_CLUSTER: drupal11-cluster
  ECS_SERVICE: drupal11-service
  ECS_TASK_FAMILY: drupal11-task
  CONTAINER_NAME: drupal

jobs:
  # ---------------------------------------------------------------------
  # 1. Composer install, coding standards, and tests
  # ---------------------------------------------------------------------
  test:
    name: Composer install & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, gd, pdo_mysql, opcache
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Drupal coding standards
        run: vendor/bin/phpcs --standard=Drupal,DrupalPractice web/modules/custom web/themes/custom

      - name: PHPUnit (unit + kernel tests)
        run: vendor/bin/phpunit --testsuite unit,kernel
        env:
          SIMPLETEST_DB: "sqlite://localhost/sites/default/files/.sqlite"

  # ---------------------------------------------------------------------
  # 2. Build image and push to Amazon ECR — only after tests pass, main only
  # ---------------------------------------------------------------------
  build:
    name: Build & push image
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC -> AWS
      contents: read
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------
  # 3. Render a new task definition and deploy it to the Fargate service
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy to ECS/Fargate
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      task-def-arn: ${{ steps.deploy.outputs.task-definition-arn }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with the new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to ECS service
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ---------------------------------------------------------------------
  # 4. Run drush deploy (config import + database updates + cache rebuild)
  #    as a one-off task against the new task definition, after the
  #    service is stable so it runs the new code against the live DB.
  # ---------------------------------------------------------------------
  drush-deploy:
    name: Run drush deploy
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run drush deploy as a one-off ECS task
        run: |
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query "services[0].networkConfiguration" --output json)

          SUBNETS=$(echo $NETWORK_CONFIG | jq -c '.awsvpcConfiguration.subnets')
          SGS=$(echo $NETWORK_CONFIG | jq -c '.awsvpcConfiguration.securityGroups')

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ needs.deploy.outputs.task-def-arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=$SGS,assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"${{ env.CONTAINER_NAME }}","command":["drush","deploy","-y"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for drush deploy task to finish: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN \
            --query "tasks[0].containers[0].exitCode" --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "drush deploy failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "drush deploy completed successfully"
