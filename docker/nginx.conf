worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    server {
        # ECS health checks and the ALB will hit this port
        listen 8080;
        server_name _;
        root /var/www/html/web;
        index index.php;

        location / {
            try_files $uri /index.php?$query_string;
        }

        # Lightweight health check that does NOT trigger full Drupal bootstrap
        location = /healthz {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_PROXY "";
            fastcgi_read_timeout 300;
        }

        # Deny access to sensitive Drupal files
        location ~ ^/sites/.*/private/ { deny all; }
        location ~ (^|/)\. { deny all; }
        location ~* \.(engine|inc|install|module|profile|po|sh|.*sql|theme|twig|tpl(\.php)?|xtmpl|yml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|^(\.(?!well-known).*|Entries.*|Repository|Root|Tag|Template|composer\.(json|lock)|.*\.sh)$ {
            deny all;
        }

        location ~* \.(css|js|gif|jpe?g|png|svg|woff2?|ttf|ico)$ {
            try_files $uri @rewrite;
            expires 1y;
            access_log off;
        }

        location @rewrite {
            rewrite ^ /index.php;
        }
    }
}
